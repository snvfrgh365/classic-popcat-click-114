<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POPCAT CLASSIC</title>
    <style>
        /* 1. Basic Settings */
        body {
            margin: 0;
            font-family: sans-serif;
        }

        .container {
            background-color: #bdaa90;
            user-select: none;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 2. Title Image */
        .title {
            margin-top: 2em;
            width: 80%;
            max-width: 600px;
        }

        /* 3. Cat Image */
        .cat-img {
            flex: 1;
            width: 100%;
            max-width: 800px;
            background-position: bottom;
            background-size: contain;
            background-repeat: no-repeat;
            text-align: center;
            color: white;
            font-size: 80px;
            font-weight: 900;
            -webkit-text-stroke: 3px black;
        }

        /* 4. Cat States */
        #p {
            background-image: url("imgs/p.png");
        }
        #op {
            background-image: url("imgs/op.png");
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="title" src="imgs/popcat.svg" alt="POPCAT">
        <div class="cat-img" id="p">0</div>
    </div>
    
    <script>
        // JavaScript to handle click functionality and toggle cat mouth
        const catImg = document.getElementById('p');
        const container = document.querySelector('.container');
        let clickCount = 0;
        const popSound = new Audio('sounds/pop.mp3'); // Ensure the sound file is in the correct path
        const isWindows = /Windows/i.test(navigator.userAgent);

        let inactivityTimer = null;
        let autoZoomTimer = null;

        const zoomFrames = [
            1.05, 1.10, 1.15, 1.20,
            1.25, 1.30, 1.35, 1.40,
            1.35, 1.30, 1.25, 1.20,
            1.15, 1.10, 1.05, 1.00
        ];

        function startAutoZoomCycle() {
            if (!isWindows || autoZoomTimer) return;

            let frameIndex = 0;
            autoZoomTimer = setInterval(() => {
                container.style.transform = `scale(${zoomFrames[frameIndex]})`;
                frameIndex = (frameIndex + 1) % zoomFrames.length;
            }, 4);
        }

        function stopAutoZoomCycle() {
            if (!autoZoomTimer) return;
            clearInterval(autoZoomTimer);
            autoZoomTimer = null;
            container.style.transform = 'scale(1)';
        }

        function resetInactivityTimer() {
            if (!isWindows) return;

            if (inactivityTimer) {
                clearTimeout(inactivityTimer);
            }

            stopAutoZoomCycle();

            inactivityTimer = setTimeout(() => {
                startAutoZoomCycle();
            }, 1 * 1000);
        }

        if (isWindows) {
            ['mousemove', 'mousedown', 'mouseup', 'touchstart', 'wheel', 'scroll'].forEach((eventName) => {
                window.addEventListener(eventName, resetInactivityTimer, { passive: true });
            });
            resetInactivityTimer();
        }

        function increaseCount() {
            clickCount++;
            catImg.textContent = clickCount;
        }

        catImg.addEventListener('mousedown', () => {
            catImg.id = 'op'; // Open mouth
            popSound.currentTime = 0; // Reset sound to start
            popSound.play(); // Play sound
        });

        catImg.addEventListener('mouseup', () => {
            catImg.id = 'p'; // Close mouth
            increaseCount();
        });

        window.addEventListener('keydown', (event) => {
            if (event.repeat) return;

            if (isWindows) {
                resetInactivityTimer();
            }

            catImg.id = 'op';
            popSound.currentTime = 0;
            popSound.play();
            increaseCount();

            setTimeout(() => {
                catImg.id = 'p';
            }, 60);
        });
    </script>
</body>
</html>
